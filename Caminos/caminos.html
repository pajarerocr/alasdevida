<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caminos — Alas de Vida</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Manrope, sans-serif;
}

#map{
  height:100vh;
}

.popup{
  color:black;
  font-size:14px;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([9.75,-83.8],7);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution:"© OpenStreetMap"
}).addTo(map);

fetch("caminos-data.json")
  .then(r => r.json())
  .then(data => {
    data.territories.forEach(place => {
      let marker = L.circleMarker([place.lat, place.lng], {
        radius: 6,
        color: "#ffffff",
        fillColor: "#ffffff",
        fillOpacity: 0.8
      }).addTo(map);

      marker.bindPopup(`
        <div class="popup">
          <strong>${place.name}</strong><br>
          ${place.category}
        </div>
      `);
    });
  });
</script>

</body>
</html>
