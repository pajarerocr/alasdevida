<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alas de Vida</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: serif;
}

.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  background-image: url("portada.png");
  background-size: cover;
  background-position: center;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.22);
}

.logo-container {
  position: absolute;
  right: 6%;
  top: 55%;
  transform: translateY(-50%);
  z-index: 2;
}

.logo {
  width: 760px;
  max-width: 52vw;
  display: block;
}

/* Ajuste para tablet y celular */
@media (max-width: 900px) {
  .logo-container {
    right: 6%;
    top: 56%;
    transform: translateY(-50%);
  }

  .logo {
    width: 420px;
    max-width: 62vw;
  }
}

/* Ajuste específico para celular vertical */
@media (max-width: 600px) {
  .hero {
    background-position: 38% center;
  }

  .hero::after {
    background: rgba(0,0,0,0.18);
  }

  .logo-container {
    right: 8%;
    top: 58%;
    transform: translateY(-50%);
  }

  .logo {
    width: 360px;
    max-width: 58vw;
  }
}
</style>
</head>

<body>
  <div class="hero">
    <div class="logo-container">
      <img src="logo_white.png" class="logo" alt="Alas de Vida">
    </div>
  </div>
</body>
</html>
