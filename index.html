<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alas de Vida</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  background-image: url("portada.png");
  background-size: cover;
  background-position: center;
}

/* oscurecido suave */

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.22);
}

/* DESKTOP */

.logo-container {
  position: absolute;
  right: 7%;
  top: 55%;
  transform: translateY(-50%);
  z-index: 2;
}

.logo {
  width: 420px;
  max-width: 35vw;
}

/* CELULAR */

@media (max-width: 700px) {

  .hero {
    background-position: 40% center;
  }

  .logo-container {
    right: auto;
    left: 50%;
    bottom: 12%;
    top: auto;
    transform: translateX(-50%);
  }

  .logo {
    width: 320px;
    max-width: 70vw;
  }

}

</style>
</head>

<body>

<div class="hero">

  <div class="logo-container">
    <img src="logo_white.png" class="logo" alt="Alas de Vida">
  </div>

</div>

</body>
</html>
