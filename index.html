<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alas de Vida</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  overflow: hidden;
}

.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  background-image: url("portada.png");
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.18);
}

/* DESKTOP */
.logo-container {
  position: absolute;
  right: 6%;
  top: 20%;
  transform: translateY(-50%);
  z-index: 2;
}

.logo {
  display: block;
  width: 580px;
  max-width: 34vw;
  height: auto;
}

/* TABLET */
@media (max-width: 900px) {
  .logo-container {
    right: 5%;
    top: 50%;
  }

  .logo {
    width: 480px;
    max-width: 42vw;
  }
}

/* CELULAR */
@media (max-width: 700px) {
  .hero {
    background-position: 38% center;
  }

  .hero::after {
    background: rgba(0,0,0,0.12);
  }

  .logo-container {
    left: 50%;
    right: auto;
    top: auto;
    bottom: calc(14% + env(safe-area-inset-bottom));
    transform: translateX(-50%);
  }

  .logo {
    width: 480px;
    max-width: 62vw;
  }
}
</style>
</head>

<body>
  <div class="hero">
    <div class="logo-container">
      <img src="logo_white.png" class="logo" alt="Alas de Vida">
    </div>
  </div>
</body>
</html>
