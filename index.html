<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alas de Vida</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: serif;
}

/* Imagen de fondo */

.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  background-image: url("portada.png");
  background-size: cover;
  background-position: center;
}

/* Oscurecer ligeramente la foto para que el logo se vea mejor */

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
}

/* Logo */

.logo-container {
  position: absolute;
  right: 8%;
  top: 50%;
  transform: translateY(-50%);
  z-index: 2;
}

.logo {
  width: 420px;
  max-width: 45vw;
}

</style>
</head>

<body>

<div class="hero">

  <div class="logo-container">
    <img src="logo_white.png" class="logo">
  </div>

</div>

</body>
</html>
