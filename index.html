<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alas de Vida</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  overflow-x: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #000;
  color: #fff;
}

.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  background-image: url("portada.png");
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.18);
}

/* DESKTOP */
.logo-container {
  position: absolute;
  right: 7%;
  top: 56%;
  transform: translateY(-50%);
  z-index: 2;
}

.logo {
  display: block;
  width: 500px;
  max-width: 36vw;
  height: auto;
}

/* TABLET */
@media (max-width: 900px) {
  .logo-container {
    right: 6%;
    top: 57%;
  }

  .logo {
    width: 420px;
    max-width: 42vw;
  }
}

/* CELULAR */
@media (max-width: 700px) {
  .hero {
    background-position: 38% center;
  }

  .hero::after {
    background: rgba(0,0,0,0.12);
  }

  .logo-container {
    left: 50%;
    right: auto;
    top: auto;
    bottom: calc(12% + env(safe-area-inset-bottom));
    transform: translateX(-50%);
  }

  .logo {
    width: 380px;
    max-width: 68vw;
  }
}

/* BLOQUE DE INTRO */
.intro {
  max-width: 720px;
  margin: 120px auto;
  padding: 0 30px;
  font-size: 22px;
  line-height: 1.7;
  text-align: center;
  font-weight: 300;
  color: #fff;
}

.intro p {
  margin: 0 0 25px 0;
}

.intro a {
  display: inline-block;
  margin-top: 10px;
  font-size: 16px;
  letter-spacing: 0.05em;
  text-decoration: none;
  color: #fff;
  border-bottom: 1px solid rgba(255,255,255,0.5);
  padding-bottom: 4px;
}

/* AJUSTES DE TEXTO EN CELULAR */
@media (max-width: 700px) {
  .intro {
    margin: 80px auto;
    padding: 0 24px;
    font-size: 19px;
    line-height: 1.65;
  }

  .intro a {
    font-size: 15px;
  }
}
</style>
</head>

<body>

  <div class="hero">
    <div class="logo-container">
      <img src="logo_white.png" class="logo" alt="Alas de Vida">
    </div>
  </div>

  <section class="intro">
    <p>
      Alas de Vida es un proyecto que surge de mi necesidad de compartir experiencias,
      historias, reflexiones y observaciones.
    </p>

    <a href="sobre.html">Leer más →</a>
  </section>

</body>
</html>
