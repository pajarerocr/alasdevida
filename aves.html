body{
  margin:0;
  background:black;
  color:white;
  font-family:"Manrope", sans-serif;
}

/* NAV */
.nav{
  position:sticky;
  top:0;
  background:black;
  z-index:10;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav-inner{
  max-width:1100px;
  margin:auto;
  padding:18px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav-logo img{
  height:120px;
  width:auto;
  display:block;
}

.nav-links{
  display:flex;
  gap:22px;
}

.nav-links a{
  text-decoration:none;
  color:white;
  opacity:0.8;
  font-size:14px;
}

.nav-links a:hover{
  opacity:1;
}

.nav-links a.activo{
  opacity:1;
  border-bottom:1px solid rgba(255,255,255,0.6);
  padding-bottom:3px;
}

/* ENCABEZADO */
.encabezado{
  max-width:760px;
  margin:90px auto 50px auto;
  text-align:center;
  padding:0 24px;
}

.encabezado h1{
  margin:0 0 14px 0;
  font-size:42px;
  font-weight:500;
  letter-spacing:0.04em;
}

.encabezado p{
  margin:0;
  opacity:0.75;
  font-size:19px;
  line-height:1.7;
}

/* CONTROLES */
.controles{
  max-width:1100px;
  margin:0 auto 40px auto;
  padding:0 30px;
}

.controles-top{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  justify-content:space-between;
  align-items:center;
}

.buscar{
  flex:1 1 280px;
}

.buscar input{
  width:100%;
  box-sizing:border-box;
  padding:14px 16px;
  background:#0d0d0d;
  border:1px solid rgba(255,255,255,0.12);
  color:white;
  font-family:"Manrope", sans-serif;
  font-size:15px;
}

.buscar input::placeholder{
  color:rgba(255,255,255,0.45);
}

.filtros{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.filtros select{
  padding:12px 14px;
  background:#0d0d0d;
  border:1px solid rgba(255,255,255,0.12);
  color:white;
  font-family:"Manrope", sans-serif;
  font-size:14px;
}

/* INFO RESULTADOS */
.resumen{
  max-width:1100px;
  margin:0 auto 30px auto;
  padding:0 30px;
  opacity:0.6;
  font-size:14px;
}

/* GALERIA */
.galeria-aves{
  max-width:1100px;
  margin:0 auto 60px auto;
  padding:0 30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:32px 24px;
}

.ave-card{
  display:block;
}

.ave-card img{
  width:100%;
  aspect-ratio:4 / 5;
  object-fit:cover;
  display:block;
  margin-bottom:14px;
  background:#111;
}

.lightbox-trigger{
  cursor:pointer;
}

.ave-info h3{
  margin:0 0 6px 0;
  font-size:20px;
  font-weight:500;
  line-height:1.3;
}

.ave-info p{
  margin:0 0 6px 0;
  font-size:15px;
  line-height:1.45;
}

.ave-info .esp{
  opacity:0.86;
}

.ave-info .sci{
  opacity:0.72;
  font-style:italic;
}

.ave-info .loc{
  opacity:0.58;
  font-size:14px;
  margin-bottom:10px;
}

.ave-info a{
  text-decoration:none;
  color:white;
  border-bottom:1px solid rgba(255,255,255,0.45);
  padding-bottom:3px;
  font-size:15px;
}

.ave-info a:hover{
  border-bottom:1px solid rgba(255,255,255,0.85);
}

/* MOSTRAR MAS */
.mostrar-mas-wrap{
  text-align:center;
  margin:0 auto 100px auto;
}

.mostrar-mas-btn{
  background:none;
  color:white;
  border:1px solid rgba(255,255,255,0.25);
  border-radius:999px;
  padding:12px 22px;
  font-family:"Manrope", sans-serif;
  font-size:15px;
  cursor:pointer;
}

.mostrar-mas-btn:hover{
  border-color:rgba(255,255,255,0.6);
}

/* SIN RESULTADOS */
.sin-resultados{
  display:none;
  max-width:720px;
  margin:20px auto 100px auto;
  padding:0 28px;
  text-align:center;
  opacity:0.7;
  line-height:1.7;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.94);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:30px;
  box-sizing:border-box;
}

.lightbox.active{
  display:flex;
}

.lightbox-inner{
  max-width:1100px;
  width:100%;
  max-height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.lightbox-image{
  max-width:100%;
  max-height:75vh;
  object-fit:contain;
  display:block;
}

.lightbox-caption{
  margin-top:20px;
  text-align:center;
  line-height:1.5;
}

.lightbox-caption .eng{
  font-size:22px;
  font-weight:500;
  margin-bottom:4px;
}

.lightbox-caption .esp{
  opacity:0.85;
  margin-bottom:4px;
}

.lightbox-caption .sci{
  opacity:0.7;
  font-style:italic;
  margin-bottom:4px;
}

.lightbox-caption .loc{
  opacity:0.6;
  font-size:14px;
  margin-bottom:4px;
}

.lightbox-caption .holdridge{
  opacity:0.55;
  font-size:14px;
}

.lightbox-close{
  position:absolute;
  top:18px;
  right:22px;
  font-size:34px;
  line-height:1;
  color:white;
  background:none;
  border:none;
  cursor:pointer;
  opacity:0.8;
}

.lightbox-close:hover{
  opacity:1;
}

.lightbox-prev,
.lightbox-next{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:white;
  font-size:42px;
  cursor:pointer;
  opacity:0.75;
  padding:12px;
}

.lightbox-prev:hover,
.lightbox-next:hover{
  opacity:1;
}

.lightbox-prev{
  left:18px;
}

.lightbox-next{
  right:18px;
}

/* FOOTER */
.footer{
  margin-top:120px;
  border-top:1px solid rgba(255,255,255,0.08);
  padding:50px 28px 60px 28px;
  background:black;

.footer-inner{
  max-width:720px;
  margin:0 auto;
  text-align:center;
}

.footer-logo{
  width:120px;
  height:auto;
  margin-bottom:18px;
  opacity:0.9;

.footer-titulo{

  font-size:18px;
  font-weight:500;
  letter-spacing:0.04em;

.footer-texto{
  margin:0 0 12px 0;

  font-size:15px;
  line-height:1.6;

.footer-copy{

  opacity:0.45;
  font-size:13px;

    justify-content:center;

  }

  .lightbox-next{
    font-size:34px;
  }

  .lightbox-close{
    top:12px;
    right:14px;
    font-size:30px;
  }
}
</style>

const LIMITE_INICIAL = 12;
const CARGA_POR_CLICK = 12;

const gallery = document.getElementById('gallery');
const searchInput = document.getElementById('searchInput');
const familiaFilter = document.getElementById('familiaFilter');
const habitatFilter = document.getElementById('habitatFilter');
const provinciaFilter = document.getElementById('provinciaFilter');
const sortSelect = document.getElementById('sortSelect');
const resultsCount = document.getElementById('resultsCount');
const noResults = document.getElementById('noResults');
const mostrarMasWrap = document.getElementById('mostrarMasWrap');
const mostrarMasBtn = document.getElementById('mostrarMasBtn');

const lightbox = document.getElementById('lightbox');
const lightboxImage = document.getElementById('lightboxImage');
const lightboxCaption = document.getElementById('lightboxCaption');
const lightboxClose = document.getElementById('lightboxClose');
const lightboxPrev = document.getElementById('lightboxPrev');
const lightboxNext = document.getElementById('lightboxNext');

let avesOrdenadas = [];
let avesFiltradas = [];
let avesVisibles = [];
let cantidadVisible = LIMITE_INICIAL;
let currentItems = [];
let currentIndex = 0;
let touchStartX = 0;
let touchEndX = 0;

function shuffleArray(array) {
  const copia = [...array];
  for (let i = copia.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }
  return copia;
}

function ordenarBase() {
  const orden = sortSelect.value;

  if (orden === "recent") {
    avesOrdenadas = [...aves].sort((a, b) => new Date(b.date) - new Date(a.date));
    return;
  }

  if (orden === "oldest") {
    avesOrdenadas = [...aves].sort((a, b) => new Date(a.date) - new Date(b.date));
    return;
  }

  avesOrdenadas = shuffleArray(aves);
}

function crearCardHTML(ave){
  return `
    <div class="ave-card">
      <img src="${ave.image}" alt="${ave.name}" class="lightbox-trigger">
      <div class="ave-info">
        <h3>${ave.name}</h3>
        <p class="esp">${ave.spanish}</p>
        <p class="sci"><em>${ave.scientific}</em></p>
        <p class="loc">${ave.location}</p>
        ${ave.link ? `<a href="${ave.link}">Leer más →</a>` : ""}
      </div>
    </div>
  `;
}
  
function renderGallery(items){
  gallery.innerHTML = items.map(crearCardHTML).join('');
  bindLightboxClicks();
}

function hayFiltrosActivos(){
  return (
    searchInput.value.trim() !== '' ||
    familiaFilter.value !== '' ||
    habitatFilter.value !== '' ||
    provinciaFilter.value !== ''
  );
}

function actualizarBotonMostrarMas(){
  if (hayFiltrosActivos()) {
    mostrarMasWrap.style.display = 'none';
    return;
  }

  if (cantidadVisible < avesFiltradas.length) {
    mostrarMasWrap.style.display = 'block';
  } else {
    mostrarMasWrap.style.display = 'none';
  }
}

function aplicarFiltros() {
  const searchValue = searchInput.value.trim().toLowerCase();
  const familiaValue = familiaFilter.value;
  const habitatValue = habitatFilter.value;
  const provinciaValue = provinciaFilter.value;

  avesFiltradas = avesOrdenadas.filter(ave => {
    const matchSearch = ave.search.toLowerCase().includes(searchValue);
    const matchFamilia = !familiaValue || ave.familia === familiaValue;
    const matchHabitat = !habitatValue || ave.habitat === habitatValue;
    const matchProvincia = !provinciaValue || ave.provincia === provinciaValue;
    return matchSearch && matchFamilia && matchHabitat && matchProvincia;
  });

  if (hayFiltrosActivos()) {
    avesVisibles = [...avesFiltradas];
  } else {
    avesVisibles = avesFiltradas.slice(0, cantidadVisible);
  }

  renderGallery(avesVisibles);

  resultsCount.textContent =
    avesFiltradas.length === 1 ? '1 entrada' : `${avesFiltradas.length} entradas`;

  noResults.style.display = avesFiltradas.length === 0 ? 'block' : 'none';

  actualizarBotonMostrarMas();
}

function cargarMas(){
  cantidadVisible += CARGA_POR_CLICK;
  aplicarFiltros();
}

function bindLightboxClicks(){
  const visibleCards = Array.from(document.querySelectorAll('.ave-card'));
  visibleCards.forEach((card, index) => {
    const img = card.querySelector('.lightbox-trigger');
    if(img){
      img.onclick = () => {
        currentItems = [...avesVisibles];
        currentIndex = index;
        renderLightbox(currentIndex);
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      };
    }
  });
}

function renderLightbox(index){
  if (!currentItems.length) return;
  currentIndex = index;
  const ave = currentItems[currentIndex];

  lightboxImage.src = ave.image;
  lightboxImage.alt = ave.name;
  lightboxCaption.querySelector('.eng').textContent = ave.name;
  lightboxCaption.querySelector('.esp').textContent = ave.spanish;
  lightboxCaption.querySelector('.sci').textContent = ave.scientific;
  lightboxCaption.querySelector('.loc').textContent = ave.location;
  lightboxCaption.querySelector('.holdridge').textContent = `Zona de vida: ${ave.holdridge}`;
}

function closeLightbox(){
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
}

function showNext(){
  if (!currentItems.length) return;
  currentIndex = (currentIndex + 1) % currentItems.length;
  renderLightbox(currentIndex);
}

function showPrev(){
  if (!currentItems.length) return;
  currentIndex = (currentIndex - 1 + currentItems.length) % currentItems.length;
  renderLightbox(currentIndex);
}

function ordenarGaleria() {
  cantidadVisible = LIMITE_INICIAL;
  ordenarBase();
  aplicarFiltros();
}

searchInput.addEventListener('input', aplicarFiltros);
familiaFilter.addEventListener('change', aplicarFiltros);
habitatFilter.addEventListener('change', aplicarFiltros);
provinciaFilter.addEventListener('change', aplicarFiltros);
sortSelect.addEventListener('change', ordenarGaleria);
mostrarMasBtn.addEventListener('click', cargarMas);

lightboxClose.addEventListener('click', closeLightbox);
lightboxNext.addEventListener('click', showNext);
lightboxPrev.addEventListener('click', showPrev);

lightbox.addEventListener('click', (e) => {
  if(e.target === lightbox){
    closeLightbox();
  }
});

document.addEventListener('keydown', (e) => {
  if(!lightbox.classList.contains('active')) return;
  if(e.key === 'Escape') closeLightbox();
  if(e.key === 'ArrowRight') showNext();
  if(e.key === 'ArrowLeft') showPrev();
});

lightbox.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
}, {passive:true});

lightbox.addEventListener('touchend', (e) => {
  touchEndX = e.changedTouches[0].screenX;
  const delta = touchEndX - touchStartX;
  if(Math.abs(delta) > 50){
    if(delta < 0){
      showNext();
    } else {
      showPrev();
    }
  }
}, {passive:true});

/* INIT */
ordenarBase();
aplicarFiltros();
</script>
