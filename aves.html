<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aves — Alas de Vida</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:white;
font-family:"Manrope", sans-serif;
}

/* NAV */

.nav{
position:sticky;
top:0;
background:black;
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:10;
}

.nav-inner{
max-width:1100px;
margin:auto;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav-links{
display:flex;
gap:22px;
}

.nav-links a{
text-decoration:none;
color:white;
opacity:0.8;
font-size:14px;
}

.nav-links a:hover{
opacity:1;
}

.nav-links a.activo{
opacity:1;
border-bottom:1px solid rgba(255,255,255,0.6);
padding-bottom:3px;
}

/* HEADER */

.encabezado{
max-width:760px;
margin:90px auto 50px auto;
text-align:center;
padding:0 24px;
}

.encabezado h1{
margin:0 0 14px 0;
font-size:42px;
font-weight:500;
}

.encabezado p{
opacity:0.75;
font-size:18px;
}

/* CONTROLES */

.controles{
max-width:1100px;
margin:auto;
padding:0 30px 40px 30px;
}

.controles-top{
display:flex;
flex-wrap:wrap;
gap:14px;
justify-content:space-between;
align-items:center;
}

.buscar input{
padding:14px;
background:#0d0d0d;
border:1px solid rgba(255,255,255,0.12);
color:white;
font-size:15px;
}

select{
padding:12px;
background:#0d0d0d;
border:1px solid rgba(255,255,255,0.12);
color:white;
}

/* GALERIA */

.galeria-aves{
max-width:1100px;
margin:auto;
padding:0 30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:32px 24px;
}

.ave-card img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
margin-bottom:14px;
cursor:pointer;
}

.ave-info h3{
margin:0;
font-size:20px;
}

.ave-info p{
margin:4px 0;
font-size:15px;
}

.ave-info .loc{
opacity:0.6;
font-size:14px;
}

.ave-info a{
text-decoration:none;
color:white;
border-bottom:1px solid rgba(255,255,255,0.5);
}

/* BOTON */

.mostrar-mas-wrap{
text-align:center;
margin:70px;
}

button{
background:none;
border:1px solid rgba(255,255,255,0.25);
padding:12px 20px;
color:white;
cursor:pointer;
border-radius:30px;
}

button:hover{
border-color:white;
}

/* LIGHTBOX */

.lightbox{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.lightbox img{
max-width:95%;
max-height:95%;
}

</style>
</head>


<body>

<header class="nav">
<div class="nav-inner">

<div>Alas de Vida</div>

<nav class="nav-links">
<a href="index.html">Inicio</a>
<a href="aves.html" class="activo">Aves</a>
<a href="caminos.html">Caminos</a>
<a href="bitacora.html">Bitácora</a>
<a href="pajarero_cr.html">Pajarero_cr</a>
</nav>

</div>
</header>


<section class="encabezado">

<h1>Aves</h1>

<p>
Una galería de encuentros, especies y escenas del pajareo.
</p>

</section>


<section class="controles">

<div class="controles-top">

<input id="searchInput" placeholder="Buscar especie...">

<select id="sortSelect">
<option value="random">Orden: Aleatorio</option>
<option value="recent">Más recientes</option>
<option value="oldest">Más antiguas</option>
</select>

</div>

</section>


<section class="galeria-aves" id="gallery"></section>

<div class="mostrar-mas-wrap">
<button id="mostrarMasBtn">Mostrar más aves</button>
</div>


<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>


<script>

const aves=[

{
name:"Great Green Macaw",
spanish:"Lapa verde mayor",
scientific:"Ara ambiguus",
location:"Manzanillo, Talamanca, Limón",
date:"2024-08-29",
image:"images/aves/great-green-macaw.jpg",
search:"lapa verde macaw ara ambiguus",
link:"lapa-verde.html"
},

{
name:"Resplendent Quetzal",
spanish:"Quetzal resplandeciente",
scientific:"Pharomachrus mocinno",
location:"Cañón del Savegre",
date:"2024-07-25",
image:"images/aves/quetzal.jpg",
search:"quetzal",
link:""
},

{
name:"Three-wattled Bellbird",
spanish:"Campanero tricarunculado",
scientific:"Procnias tricarunculatus",
location:"Navarro del Muñeco",
date:"2025-04-18",
image:"images/aves/three-wattled-bellbird.jpg",
search:"bellbird campanero",
link:""
},

{
name:"Lovely Cotinga",
spanish:"Cotinga linda",
scientific:"Cotinga amabilis",
location:"Nairi Awari, Turrialba",
date:"2024-07-06",
image:"images/aves/lovely-cotinga.jpg",
search:"cotinga",
link:""
},

{
name:"Long-tailed Manakin",
spanish:"Saltarín toledo",
scientific:"Chiroxiphia linearis",
location:"Rincón de la Vieja",
date:"2025-01-11",
image:"images/aves/long-tailed-manakin.jpg",
search:"manakin",
link:""
},

{
name:"Collared Aracari",
spanish:"Tucancillo collarejo",
scientific:"Pteroglossus torquatus",
location:"Barra del Colorado",
date:"2024-10-19",
image:"images/aves/collared-aracari.jpg",
search:"aracari",
link:""
},

{
name:"Northern Emerald-Toucanet",
spanish:"Tucancillo verde",
scientific:"Aulacorhynchus prasinus",
location:"Curicancha",
date:"2024-12-24",
image:"images/aves/northern-emerald-toucanet.jpg",
search:"toucanet",
link:""
},

{
name:"White-necked Jacobin",
spanish:"Jacobino nuquiblanco",
scientific:"Florisuga mellivora",
location:"Rancho Naturalista",
date:"2024-10-11",
image:"images/aves/white-necked-jacobin.jpg",
search:"jacobin",
link:""
},

{
name:"Magenta-throated Woodstar",
spanish:"Colibrí estrellita gorgimorada",
scientific:"Philodice bryantae",
location:"Monteverde",
date:"2025-04-12",
image:"images/aves/magenta-throated-woodstar.jpg",
search:"woodstar",
link:""
},

{
name:"Common Potoo",
spanish:"Nictibio común",
scientific:"Nyctibius griseus",
location:"Las Nubes",
date:"2025-03-29",
image:"images/aves/common-potoo.jpg",
search:"potoo",
link:""
}

]

const gallery=document.getElementById("gallery")
const searchInput=document.getElementById("searchInput")
const sortSelect=document.getElementById("sortSelect")
const mostrarMasBtn=document.getElementById("mostrarMasBtn")

let visibles=6
let lista=[...aves]

function shuffle(a){
return a.sort(()=>Math.random()-0.5)
}

function ordenar(){
const o=sortSelect.value

if(o==="recent")lista=[...aves].sort((a,b)=>new Date(b.date)-new Date(a.date))
else if(o==="oldest")lista=[...aves].sort((a,b)=>new Date(a.date)-new Date(b.date))
else lista=shuffle([...aves])
}

function crearCard(ave){

return`
<div class="ave-card">

<img src="${ave.image}" class="img">

<div class="ave-info">

<h3>${ave.name}</h3>

<p>${ave.spanish}</p>

<p><em>${ave.scientific}</em></p>

<p class="loc">${ave.location}</p>

${ave.link?`<a href="${ave.link}">Leer más →</a>`:""}

</div>

</div>
`

}

function render(){

const q=searchInput.value.toLowerCase()

const filtradas=lista.filter(a=>a.search.includes(q))

gallery.innerHTML=filtradas.slice(0,visibles).map(crearCard).join("")

}

searchInput.oninput=render

sortSelect.onchange=()=>{
ordenar()
render()
}

mostrarMasBtn.onclick=()=>{
visibles+=6
render()
}

/* lightbox */

document.addEventListener("click",e=>{

if(e.target.classList.contains("img")){
const lb=document.getElementById("lightbox")
const img=document.getElementById("lightbox-img")
img.src=e.target.src
lb.style.display="flex"
}

})

document.getElementById("lightbox").onclick=()=>{
document.getElementById("lightbox").style.display="none"
}

ordenar()
render()

</script>

</body>
</html>
